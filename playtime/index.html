<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Playtime Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Steam Playtime Tracker</h1>
    <div class="container">
        <label for="apiKey">Steam API Key:</label>
        <input type="text" id="apiKey" placeholder="Enter your Steam API Key">
        
        <label for="steamId">Steam ID:</label>
        <input type="text" id="steamId" placeholder="Enter your Steam ID (64-bit)">
        
        <button id="fetchBtn">Fetch Playtime</button>
        
        <hr>
        
        <h3>Update Obsidian Files (Optional)</h3>
        <label for="mdFiles">Select Markdown Files to Update:</label>
        <input type="file" id="mdFiles" multiple accept=".md" />
        <button id="updateBtn" style="display:none;">Update Selected Files</button>
        
        <div id="results"></div>
        
        <button id="downloadBtn" style="display:none;">Download as Markdown</button>
    </div>
    <script src="script.js"></script>
</body>
</html></content>
